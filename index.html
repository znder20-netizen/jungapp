<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jung Faserwerke</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1A1F1B;
  color: #E8E8E8;
}

h1, h2, h3 {
  margin: 0 0 10px 0;
  font-weight: 600;
}

button {
  background: #4A7C59;
  border: none;
  padding: 10px 16px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 15px;
}
button:hover { background: #3d684a; }

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0 14px 0;
  border-radius: 6px;
  border: 1px solid #333;
  background: #111;
  color: #eee;
}

.page { display: none; padding: 20px; }
.page.active { display: block; }

#nav {
  display: flex;
  background: #111;
  border-bottom: 1px solid #333;
}
.tab {
  padding: 14px 20px;
  cursor: pointer;
  color: #ccc;
}
.tab.active {
  background: #4A7C59;
  color: white;
}

#dashboardGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.dashboard-card {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
  border: 1px solid #333;
}
.dashboard-card span {
  font-size: 26px;
  font-weight: bold;
}

.list-item {
  background: #222;
  padding: 14px;
  border-radius: 8px;
  margin-bottom: 10px;
  border: 1px solid #333;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
  display: inline-block;
  margin-top: 4px;
}
.badge-pilot { background: #4CAF50; color: white; }
.badge-serie { background: #2196F3; color: white; }
.badge-int { background: #FFC107; color: black; }

.offer-card {
  background: #222;
  padding: 16px;
  border-radius: 10px;
  border: 1px solid #333;
  margin-bottom: 12px;
}

#panelOverlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
}
#panelOverlay.open { display: block; }

#panel {
  position: fixed;
  top: 0; right: -500px;
  width: 420px;
  height: 100%;
  background: #1A1F1B;
  border-left: 1px solid #333;
  padding: 20px;
  overflow-y: auto;
  transition: 0.3s ease;
}
#panel.open { right: 0; }

.panel-close {
  float: right;
  cursor: pointer;
  font-size: 22px;
  color: #aaa;
}
.panel-close:hover { color: white; }
</style>
</head>
<body>

<div id="nav">
  <div class="tab active" onclick="showPage('dashboard')">Dashboard</div>
  <div class="tab" onclick="showPage('kunden')">Kunden</div>
  <div class="tab" onclick="showPage('angebote')">Angebote</div>
  <div class="tab" onclick="showPage('produkte')">Produkte</div>
  <div class="tab" onclick="showPage('materialien')">Materialien</div>
  <div class="tab" onclick="showPage('formen')">Formen</div>
  <div class="tab" onclick="showPage('parameter')">Parameter</div>
</div>

<div id="dashboard" class="page active">
  <h1>Dashboard</h1>
<div id="dashboard" class="page active">
  <h1>Dashboard</h1>

  <!-- INSTALLIEREN BUTTON -->
  <button id="installBtn" style="display:none; margin:20px 0; background:#4A7C59;">
    App installieren
  </button>

  <div id="dashboardGrid"></div>
  ...
</div>
  <div id="dashboardGrid"></div>
  <h2 style="margin-top:30px;">Diagramme</h2>
  <canvas id="chartKapazitaet" height="120"></canvas>
  <canvas id="chartMaterialkosten" height="120" style="margin-top:30px;"></canvas>
  <canvas id="chartAngeboteKunden" height="120" style="margin-top:30px;"></canvas>
</div>

<div id="kunden" class="page">
  <h1>Kunden</h1>
  <button onclick="openPanel('kunde', null)">+ Neuer Kunde</button>
  <div id="kundenList" style="margin-top:20px;"></div>
</div>

<div id="angebote" class="page">
  <h1>Angebote</h1>
  <button onclick="openPanel('angebot', null)">+ Neues Angebot</button>
  <div id="angeboteList" style="margin-top:20px;"></div>
</div>

<div id="produkte" class="page">
  <h1>Produkte</h1>
  <button onclick="openPanel('produkt', null)">+ Neues Produkt</button>
  <div id="produktList"></div>
</div>

<div id="materialien" class="page">
  <h1>Materialien</h1>
  <button onclick="openPanel('material', null)">+ Neues Material</button>
  <div id="materialList"></div>
</div>

<div id="formen" class="page">
  <h1>Formen</h1>
  <button onclick="openPanel('form', null)">+ Neue Form</button>
  <div id="formList"></div>
</div>

<div id="parameter" class="page">
  <h1>Parameter</h1>
  <button onclick="exportData()">Daten exportieren</button>
  <input type="file" id="importFile" onchange="importData(event)" style="margin-top:20px;">
  <div class="card" style="margin-top:20px;">
    <label>Strompreis (€/kWh)</label>
    <input id="paramEnergy" type="number" step="0.01">
    <label>Standard-Stundensatz (€/h)</label>
    <input id="paramWage" type="number" step="0.5">
    <label>Maschinenkosten (€/h)</label>
    <input id="paramMachine" type="number" step="0.5">
    <button onclick="saveParams()">Speichern</button>
  </div>
</div>

<div id="panelOverlay">
  <div id="panel">
    <span class="panel-close" onclick="closePanel()">✕</span>
    <h2 id="panelTitle"></h2>
    <div id="panelContent"></div>
  </div>
</div><script>
/* -----------------------------------------
   VERSIONING & STORAGE
----------------------------------------- */
const APP_VERSION = "2.0";
const LS_KEY = "jfAppDataV2";

/* -----------------------------------------
   GLOBAL DATA STRUCTURES
----------------------------------------- */
let kunden = [];
let angebote = [];
let produkte = [];
let materialien = [];
let formen = [];
let params = {
  energyPrice: 0.32,
  defaultWage: 14,
  machineCostPerHour: 20
};

/* -----------------------------------------
   LOAD / SAVE
----------------------------------------- */
function save() {
  const data = {
    version: APP_VERSION,
    kunden,
    angebote,
    produkte,
    materialien,
    formen,
    params
  };
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

function load() {
  const raw = localStorage.getItem(LS_KEY);
  if (!raw) return;

  try {
    const d = JSON.parse(raw);
    kunden = d.kunden || [];
    angebote = d.angebote || [];
    produkte = d.produkte || [];
    materialien = d.materialien || [];
    formen = d.formen || [];
    params = d.params || params;
  } catch (e) {
    console.error("Load error", e);
  }
}
load();

/* -----------------------------------------
   DEFAULT DATA (falls leer)
----------------------------------------- */
if (materialien.length === 0) {
  materialien = [
    {id:1,name:"Stroh",fiberPrice:0.4,fiberGrams:5,binderName:"Stärke",binderPrice:1,binderGrams:1,additiveName:"",additivePrice:0,additiveGrams:0},
    {id:2,name:"Gras",fiberPrice:0.6,fiberGrams:5,binderName:"Zelluloseleim",binderPrice:2,binderGrams:0.5,additiveName:"",additivePrice:0,additiveGrams:0},
    {id:3,name:"Hanf",fiberPrice:1.2,fiberGrams:4,binderName:"Lignin",binderPrice:3,binderGrams:0.5,additiveName:"",additivePrice:0,additiveGrams:0},
    {id:4,name:"Karton",fiberPrice:0.5,fiberGrams:6,binderName:"",binderPrice:0,binderGrams:0,additiveName:"Bienenwachs",additivePrice:2,additiveGrams:0.2},
    {id:5,name:"Holzfasern",fiberPrice:0.8,fiberGrams:5,binderName:"",binderPrice:0,binderGrams:0,additiveName:"",additivePrice:0,additiveGrams:0}
  ];
}

if (formen.length === 0) {
  formen = [
    {id:1,name:"Silikon",lifetime:500,price:40},
    {id:2,name:"Holz",lifetime:1500,price:60},
    {id:3,name:"PLA",lifetime:250,price:30},
    {id:4,name:"PETG",lifetime:500,price:40},
    {id:5,name:"Alu",lifetime:10000,price:200}
  ];
}

if (produkte.length === 0) {
  produkte = [
    {id:1,name:"Kleine Schale",materialId:1,formId:1,energyKwh:0.004,minutesPerPart:0.6,hourlyWage:14,expertiseMargin:0.30,targetPrice:0.30},
    {id:2,name:"Mittlere Schale",materialId:5,formId:2,energyKwh:0.004,minutesPerPart:0.6,hourlyWage:14,expertiseMargin:0.30,targetPrice:0.40},
    {id:3,name:"Große Schale",materialId:3,formId:5,energyKwh:0.004,minutesPerPart:0.7,hourlyWage:14,expertiseMargin:0.30,targetPrice:0.50}
  ];
}

/* -----------------------------------------
   GENERATORS
----------------------------------------- */
function generateKundenCode(firma) {
  if (!firma) return "KUNDE";
  let clean = firma
    .replace(/GmbH|UG|AG|KG|mbH/gi, "")
    .replace(/[^a-zA-Z]/g, "")
    .toUpperCase()
    .substring(0, 10);
  return clean || "KUNDE";
}

function generateAngebotsNummer(kundenCode) {
  const year = new Date().getFullYear();
  let max = 0;

  angebote.forEach(a => {
    if (a.nummer && a.nummer.includes(`${kundenCode}-${year}-`)) {
      const nr = parseInt(a.nummer.split("-")[2]);
      if (nr > max) max = nr;
    }
  });

  const next = (max + 1).toString().padStart(4, "0");
  return `${kundenCode}-${year}-${next}`;
}

/* -----------------------------------------
   COST CALCULATIONS
----------------------------------------- */
function materialKostenTeil(m) {
  const f = m.fiberPrice * (m.fiberGrams/1000);
  const b = m.binderPrice * (m.binderGrams/1000);
  const a = m.additivePrice * (m.additiveGrams/1000);
  return f + b + a;
}

function formVerschleissTeil(f) {
  return f.price / f.lifetime;
}

function basisKosten(p) {
  const m = materialien.find(x=>x.id===p.materialId);
  const f = formen.find(x=>x.id===p.formId);

  const mat = materialKostenTeil(m);
  const energy = (p.energyKwh||0) * params.energyPrice;
  const arbeit = ((p.minutesPerPart||0)/60) * (p.hourlyWage||params.defaultWage);
  const form = formVerschleissTeil(f);
  const maschine = ((p.minutesPerPart||0)/60) * params.machineCostPerHour;

  return mat + energy + arbeit + form + maschine;
}

function einzelPreis(p) {
  return basisKosten(p) * (1 + (p.expertiseMargin||0));
}

function stueckProStunde(p) {
  return 60 / p.minutesPerPart;
}

/* -----------------------------------------
   NAVIGATION
----------------------------------------- */
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");

  updateDashboard();
}

/* -----------------------------------------
   PANEL OPEN/CLOSE
----------------------------------------- */
let currentPanel = null;

function openPanel(type, id) {
  currentPanel = {type, id};
  document.getElementById("panelOverlay").classList.add("open");
  document.getElementById("panel").classList.add("open");
  renderPanelContent(type, id);
}

function closePanel() {
  document.getElementById("panelOverlay").classList.remove("open");
  document.getElementById("panel").classList.remove("open");
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePanel();
});
</script><script>
/* -----------------------------------------
   RENDERING: KUNDEN
----------------------------------------- */
function renderKunden() {
  const list = document.getElementById("kundenList");
  list.innerHTML = "";

  kunden.forEach(k => {
    const badgeClass =
      k.typ === "Pilotkunde" ? "badge-pilot" :
      k.typ === "Serienkunde" ? "badge-serie" :
      "badge-int";

    const angebotCount = angebote.filter(a => a.kundeId === k.id).length;

    list.innerHTML += `
      <div class="list-item">
        <div>
          <strong>${k.firma || k.name}</strong><br>
          <small>${k.name}</small><br>
          <span class="badge ${badgeClass}">${k.typ}</span><br>
          <small>Angebote: ${angebotCount}</small>
        </div>
        <button onclick="openPanel('kunde', ${k.id})">✎</button>
      </div>
    `;
  });
}

/* -----------------------------------------
   RENDERING: ANGEBOTE
----------------------------------------- */
function renderAngebote() {
  const list = document.getElementById("angeboteList");
  list.innerHTML = "";

  angebote.forEach(a => {
    const k = kunden.find(x => x.id === a.kundeId);
    const summe = berechneAngebotSumme(a).toFixed(2);

    list.innerHTML += `
      <div class="offer-card">
        <strong>${a.nummer}</strong><br>
        <small>${a.datum}</small><br><br>

        <strong>Kunde:</strong> ${k ? k.firma : "?"}<br>
        <strong>Positionen:</strong> ${a.positionen.length}<br>
        <strong>Gesamt:</strong> ${summe} €<br><br>

        <button onclick="openPanel('angebot', ${a.id})">Bearbeiten</button>
        <button style="background:#8b2e2e" onclick="deleteAngebot(${a.id})">Löschen</button>
      </div>
    `;
  });
}

/* -----------------------------------------
   RENDERING: PRODUKTE
----------------------------------------- */
function renderProdukte() {
  const list = document.getElementById("produktList");
  list.innerHTML = "";

  produkte.forEach(p => {
    const ep = einzelPreis(p).toFixed(3);
    const stph = stueckProStunde(p).toFixed(1);

    list.innerHTML += `
      <div class="list-item">
        <div>
          <strong>${p.name}</strong><br>
          <small>EP: ${ep} € | Stk/h: ${stph}</small>
        </div>
        <button onclick="openPanel('produkt', ${p.id})">✎</button>
      </div>
    `;
  });
}

/* -----------------------------------------
   RENDERING: MATERIALIEN
----------------------------------------- */
function renderMaterialien() {
  const list = document.getElementById("materialList");
  list.innerHTML = "";

  materialien.forEach(m => {
    const cost = materialKostenTeil(m).toFixed(4);

    list.innerHTML += `
      <div class="list-item">
        <div>
          <strong>${m.name}</strong><br>
          <small>Kosten/Teil: ${cost} €</small>
        </div>
        <button onclick="openPanel('material', ${m.id})">✎</button>
      </div>
    `;
  });
}

/* -----------------------------------------
   RENDERING: FORMEN
----------------------------------------- */
function renderFormen() {
  const list = document.getElementById("formList");
  list.innerHTML = "";

  formen.forEach(f => {
    const wear = formVerschleissTeil(f).toFixed(4);

    list.innerHTML += `
      <div class="list-item">
        <div>
          <strong>${f.name}</strong><br>
          <small>Verschleiß/Teil: ${wear} €</small>
        </div>
        <button onclick="openPanel('form', ${f.id})">✎</button>
      </div>
    `;
  });
}
</script><script>
/* -----------------------------------------
   PANEL CONTENT (EINZIGE VERSION!)
----------------------------------------- */
function renderPanelContent(type, id) {
  const title = document.getElementById("panelTitle");
  const content = document.getElementById("panelContent");
  content.innerHTML = "";

  let item = null;
  if (id) {
    if (type === "kunde") item = kunden.find(x => x.id === id);
    if (type === "angebot") item = angebote.find(x => x.id === id);
    if (type === "produkt") item = produkte.find(x => x.id === id);
    if (type === "material") item = materialien.find(x => x.id === id);
    if (type === "form") item = formen.find(x => x.id === id);
  }

  /* -----------------------------------------
     PANEL: KUNDE
  ----------------------------------------- */
  if (type === "kunde") {
    title.textContent = id ? "Kunde bearbeiten" : "Neuer Kunde";

    content.innerHTML = `
      <label>Name</label>
      <input id="k_name" value="${item?.name || ""}">

      <label>Firma</label>
      <input id="k_firma" value="${item?.firma || ""}">

      <label>E-Mail</label>
      <input id="k_mail" value="${item?.mail || ""}">

      <label>Telefon</label>
      <input id="k_tel" value="${item?.tel || ""}">

      <label>Adresse</label>
      <textarea id="k_addr">${item?.addr || ""}</textarea>

      <label>Kundentyp</label>
      <select id="k_typ">
        <option ${item?.typ==="Pilotkunde"?"selected":""}>Pilotkunde</option>
        <option ${item?.typ==="Serienkunde"?"selected":""}>Serienkunde</option>
        <option ${item?.typ==="Interessent"?"selected":""}>Interessent</option>
      </select>

      <label>Kundencode</label>
      <input id="k_code" value="${item?.code || ""}" readonly>

      <button onclick="saveKunde(${id})">Speichern</button>
      ${id ? `<button style="background:#8b2e2e" onclick="deleteKunde(${id})">Löschen</button>` : ""}
    `;
  }

  /* -----------------------------------------
     PANEL: ANGEBOT
  ----------------------------------------- */
  if (type === "angebot") {
    title.textContent = id ? "Angebot bearbeiten" : "Neues Angebot";

    const kundeOptions = kunden.map(k => `
      <option value="${k.id}" ${item?.kundeId===k.id?"selected":""}>
        ${k.firma}
      </option>
    `).join("");

    const nummer = item?.nummer || "(wird automatisch vergeben)";
    const datum = item?.datum || new Date().toISOString().slice(0,10);

    content.innerHTML = `
      <label>Kunde</label>
      <select id="a_kunde">${kundeOptions}</select>

      <label>Angebotsnummer</label>
      <input id="a_nummer" value="${nummer}" readonly>

      <label>Datum</label>
      <input id="a_datum" type="date" value="${datum}">

      <label>Notizen</label>
      <textarea id="a_notizen">${item?.notizen || ""}</textarea>

      <h3>Positionen</h3>
      <div id="a_positionen"></div>

      <h3>Neue Position</h3>
      <label>Produkt</label>
      <select id="a_pos_produkt">
        ${produkte.map(p => `<option value="${p.id}">${p.name}</option>`).join("")}
      </select>

      <label>Menge</label>
      <input id="a_pos_menge" type="number" value="1">

      <button onclick="addPosition(${id})">+ Position hinzufügen</button>

      <h3>Gesamt: <span id="a_summe">0.00</span> €</h3>

      <button onclick="saveAngebot(${id})">Speichern</button>
      ${id ? `<button style="background:#8b2e2e" onclick="deleteAngebot(${id})">Löschen</button>` : ""}
    `;

    renderAngebotPositionen(item);
  }

  /* -----------------------------------------
     PANEL: PRODUKT
  ----------------------------------------- */
  if (type === "produkt") {
    title.textContent = id ? "Produkt bearbeiten" : "Neues Produkt";

    content.innerHTML = `
      <label>Name</label>
      <input id="p_name" value="${item?.name || ""}">

      <label>Material</label>
      <select id="p_material">
        ${materialien.map(m => `<option value="${m.id}" ${item?.materialId===m.id?"selected":""}>${m.name}</option>`).join("")}
      </select>

      <label>Form</label>
      <select id="p_form">
        ${formen.map(f => `<option value="${f.id}" ${item?.formId===f.id?"selected":""}>${f.name}</option>`).join("")}
      </select>

      <label>Energie (kWh)</label>
      <input id="p_energy" type="number" step="0.001" value="${item?.energyKwh || 0}">

      <label>Minuten pro Teil</label>
      <input id="p_min" type="number" step="0.01" value="${item?.minutesPerPart || 0}">

      <label>Stundensatz (€/h)</label>
      <input id="p_wage" type="number" step="0.5" value="${item?.hourlyWage || params.defaultWage}">

      <label>Expertiseaufschlag (%)</label>
      <input id="p_margin" type="number" step="0.01" value="${item?.expertiseMargin || 0}">

      <label>Zielpreis (€)</label>
      <input id="p_target" type="number" step="0.01" value="${item?.targetPrice || 0}">

      <button onclick="saveProdukt(${id})">Speichern</button>
      ${id ? `<button style="background:#8b2e2e" onclick="deleteProdukt(${id})">Löschen</button>` : ""}
    `;
  }

  /* -----------------------------------------
     PANEL: MATERIAL
  ----------------------------------------- */
  if (type === "material") {
    title.textContent = id ? "Material bearbeiten" : "Neues Material";

    content.innerHTML = `
      <label>Name</label>
      <input id="m_name" value="${item?.name || ""}">

      <label>Faserpreis (€/kg)</label>
      <input id="m_fp" type="number" step="0.01" value="${item?.fiberPrice || 0}">

      <label>Fasermenge (g)</label>
      <input id="m_fg" type="number" step="0.1" value="${item?.fiberGrams || 0}">

      <label>Bindername</label>
      <input id="m_bn" value="${item?.binderName || ""}">

      <label>Binderpreis (€/kg)</label>
      <input id="m_bp" type="number" step="0.01" value="${item?.binderPrice || 0}">

      <label>Bindermenge (g)</label>
      <input id="m_bg" type="number" step="0.1" value="${item?.binderGrams || 0}">

      <label>Additivname</label>
      <input id="m_an" value="${item?.additiveName || ""}">

      <label>Additivpreis (€/kg)</label>
      <input id="m_ap" type="number" step="0.01" value="${item?.additivePrice || 0}">

      <label>Additivmenge (g)</label>
      <input id="m_ag" type="number" step="0.1" value="${item?.additiveGrams || 0}">

      <button onclick="saveMaterial(${id})">Speichern</button>
      ${id ? `<button style="background:#8b2e2e" onclick="deleteMaterial(${id})">Löschen</button>` : ""}
    `;
  }

  /* -----------------------------------------
     PANEL: FORM
  ----------------------------------------- */
  if (type === "form") {
    title.textContent = id ? "Form bearbeiten" : "Neue Form";

    content.innerHTML = `
      <label>Name</label>
      <input id="f_name" value="${item?.name || ""}">

      <label>Lebensdauer (Teile)</label>
      <input id="f_life" type="number" value="${item?.lifetime || 0}">

      <label>Preis (€)</label>
      <input id="f_price" type="number" step="0.01" value="${item?.price || 0}">

      <button onclick="saveForm(${id})">Speichern</button>
      ${id ? `<button style="background:#8b2e2e" onclick="deleteForm(${id})">Löschen</button>` : ""}
    `;
  }
}
</script><script>
/* -----------------------------------------
   ANGEBOT: POSITIONEN
----------------------------------------- */
function renderAngebotPositionen(a) {
  const wrap = document.getElementById("a_positionen");
  if (!a) return;

  wrap.innerHTML = "";

  a.positionen.forEach((pos, index) => {
    const p = produkte.find(x => x.id === pos.produktId);
    const ep = einzelPreis(p);
    const sum = ep * pos.menge;

    wrap.innerHTML += `
      <div class="list-item">
        <div>
          <strong>${p.name}</strong><br>
          <small>Menge: ${pos.menge}</small><br>
          <small>EP: ${ep.toFixed(2)} €</small><br>
          <small>Summe: ${sum.toFixed(2)} €</small>
        </div>
        <button style="background:#8b2e2e" onclick="deletePosition(${a.id}, ${index})">🗑</button>
      </div>
    `;
  });

  document.getElementById("a_summe").textContent = berechneAngebotSumme(a).toFixed(2);
}

function addPosition(id) {
  const a = angebote.find(x => x.id === id);
  if (!a) return;

  const produktId = +document.getElementById("a_pos_produkt").value;
  const menge = +document.getElementById("a_pos_menge").value;

  a.positionen.push({produktId, menge});
  save();
  renderAngebotPositionen(a);
}

function deletePosition(aid, index) {
  const a = angebote.find(x => x.id === aid);
  if (!a) return;

  a.positionen.splice(index, 1);
  save();
  renderAngebotPositionen(a);
}

function berechneAngebotSumme(a) {
  let sum = 0;
  a.positionen.forEach(pos => {
    const p = produkte.find(x => x.id === pos.produktId);
    sum += einzelPreis(p) * pos.menge;
  });
  return sum;
}

/* -----------------------------------------
   DASHBOARD KPIs
----------------------------------------- */
function updateDashboard() {
  const grid = document.getElementById("dashboardGrid");
  if (!grid) return;

  grid.innerHTML = `
    <div class="dashboard-card">
      <span>${kunden.length}</span><br>Kunden
    </div>
    <div class="dashboard-card">
      <span>${angebote.length}</span><br>Angebote
    </div>
    <div class="dashboard-card">
      <span>${produkte.length}</span><br>Produkte
    </div>
    <div class="dashboard-card">
      <span>${materialien.length}</span><br>Materialien
    </div>
  `;

  renderCharts();
}

/* -----------------------------------------
   CHARTS (Chart.js)
----------------------------------------- */
let chartKap = null;
let chartMat = null;
let chartKunden = null;

function renderCharts() {
  /* --- Chart 1: Kapazität --- */
  const ctx1 = document.getElementById("chartKapazitaet");
  if (ctx1) {
    if (chartKap) chartKap.destroy();
    chartKap = new Chart(ctx1, {
      type: "bar",
      data: {
        labels: produkte.map(p => p.name),
        datasets: [{
          label: "Stück pro Stunde",
          data: produkte.map(p => stueckProStunde(p)),
          backgroundColor: "#4A7C59"
        }]
      },
      options: { responsive: true }
    });
  }

  /* --- Chart 2: Materialkosten --- */
  const ctx2 = document.getElementById("chartMaterialkosten");
  if (ctx2) {
    if (chartMat) chartMat.destroy();
    chartMat = new Chart(ctx2, {
      type: "bar",
      data: {
        labels: materialien.map(m => m.name),
        datasets: [{
          label: "Kosten pro Teil (€)",
          data: materialien.map(m => materialKostenTeil(m)),
          backgroundColor: "#2196F3"
        }]
      },
      options: { responsive: true }
    });
  }

  /* --- Chart 3: Angebotssumme pro Kunde --- */
  const ctx3 = document.getElementById("chartAngeboteKunden");
  if (ctx3) {
    if (chartKunden) chartKunden.destroy();

    const kundenNamen = kunden.map(k => k.firma || k.name);
    const kundenSummen = kunden.map(k => {
      return angebote
        .filter(a => a.kundeId === k.id)
        .reduce((sum, a) => sum + berechneAngebotSumme(a), 0);
    });

    chartKunden = new Chart(ctx3, {
      type: "bar",
      data: {
        labels: kundenNamen,
        datasets: [{
          label: "Angebotssumme (€)",
          data: kundenSummen,
          backgroundColor: "#FFC107"
        }]
      },
      options: { responsive: true }
    });
  }
}

/* -----------------------------------------
   EXPORT
----------------------------------------- */
function exportData() {
  const data = {
    version: APP_VERSION,
    kunden,
    angebote,
    produkte,
    materialien,
    formen,
    params
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "jung-faserwerke-backup.json";
  a.click();

  URL.revokeObjectURL(url);
}

/* -----------------------------------------
   IMPORT
----------------------------------------- */
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      kunden = data.kunden || [];
      angebote = data.angebote || [];
      produkte = data.produkte || [];
      materialien = data.materialien || [];
      formen = data.formen || [];
      params = data.params || params;

      save();
      renderKunden();
      renderAngebote();
      renderProdukte();
      renderMaterialien();
      renderFormen();
      updateDashboard();

      alert("Daten erfolgreich importiert.");
    } catch (err) {
      alert("Fehler beim Import.");
      console.error(err);
    }
  };

  reader.readAsText(file);
}

/* -----------------------------------------
   PARAMETER SPEICHERN
----------------------------------------- */
function saveParams() {
  params.energyPrice = +document.getElementById("paramEnergy").value;
  params.defaultWage = +document.getElementById("paramWage").value;
  params.machineCostPerHour = +document.getElementById("paramMachine").value;

  save();
  alert("Parameter gespeichert.");
}

/* -----------------------------------------
   PWA SERVICE WORKER REGISTRATION
----------------------------------------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("Service Worker registriert"))
      .catch(err => console.error("SW Fehler:", err));
  });
}

/* -----------------------------------------
   INITIAL RENDER
----------------------------------------- */
renderKunden();
renderAngebote();
renderProdukte();
renderMaterialien();
renderFormen();
updateDashboard();
</script>

<script>
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

// Browser meldet: App ist installierbar
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "inline-block";
});

// Klick auf Installieren
installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;

  deferredPrompt = null;
  installBtn.style.display = "none";
});

// Wenn App bereits installiert ist
window.addEventListener("appinstalled", () => {
  installBtn.style.display = "none";
});
</script>
